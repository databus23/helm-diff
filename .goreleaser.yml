# To test this manually, run:
#  go install github.com/goreleaser/goreleaser@latest
#  goreleaser --snapshot --clean
#  for f in dist/helm-diff*.tgz; do echo Testing $f...; tar tzvf $f; done
project_name: helm-diff
builds:
  - id: default
    main: .
    binary: bin/diff
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -X github.com/databus23/helm-diff/v3/cmd.Version={{ .Version }}
    goos:
      - freebsd
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
  - id: linux-additional
    main: .
    binary: bin/diff
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -X github.com/databus23/helm-diff/v3/cmd.Version={{ .Version }}
    goos:
      - linux
    goarch:
      - arm
      - ppc64le
      - s390x
    goarm:
      - "6"
      - "7"

archives:
  - id: default
    builds:
    - default
    - linux-additional
    format: tgz
    name_template: '{{ .ProjectName }}-{{ if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}-{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    wrap_in_directory: diff
    files:
    - README.md
    - plugin.yaml
    - LICENSE

signs:
  - id: plugin-provenance
    artifacts: archive
    signature: "${artifact}.prov"
    cmd: sh
    args:
      - -ec
      - |
        artifact="$1"
        signature="$2"
        filename="$(basename "$artifact")"
        digest="$(sha256sum "$artifact" | cut -d' ' -f1)"
        if [ -z "${GPG_FINGERPRINT:-}" ]; then
          echo "ERROR: GPG_FINGERPRINT is not set. Cannot sign provenance artifact."
          exit 1
        fi
        passphrase_file="$(mktemp)"
        trap 'rm -f "$passphrase_file"' EXIT
        printf '%s' "${GPG_PASSPHRASE:-}" > "$passphrase_file"
        chmod 600 "$passphrase_file"
        {
          cat plugin.yaml
          printf '...\n'
          printf 'files:\n  %s: "sha256:%s"\n' "$filename" "$digest"
        } | gpg --batch --yes --armor --pinentry-mode loopback --passphrase-file "$passphrase_file" --local-user "$GPG_FINGERPRINT" --clearsign --output "$signature"
      - --
      - ${artifact}
      - ${signature}
changelog:
  use: github-native

release:
  prerelease: auto
